# Optional policy file for future versions.
# Built-in mappings live in internal/doctor/explain.go. This file documents
# intended custom override shape.

rules:
  - match: ["NETFILTER", "NF_", "FIREWALL"]
    domain: firewall
    summary: "netfilter/nftables/iptables 계층에서 DROP verdict가 발생했을 가능성이 큽니다."
    checks:
      - "sudo nft list ruleset"
      - "sudo iptables-save"
      - "sudo conntrack -S"

  - match: ["CONNTRACK", "CT_"]
    domain: conntrack
    summary: "conntrack 상태 추적 또는 NAT state 문제일 수 있습니다."
    checks:
      - "sudo conntrack -S"
      - "sudo conntrack -L | head"

  - match: ["NO_ROUTE", "ROUTE", "RPFILTER", "XFRM", "IP_"]
    domain: routing
    summary: "라우팅, policy routing, rp_filter 또는 XFRM 정책 문제일 수 있습니다."
    checks:
      - "ip route get <dst>"
      - "ip rule show"
      - "sysctl net.ipv4.conf.all.rp_filter"

  - match: ["QDISC", "TC_", "QUEUE"]
    domain: qdisc
    summary: "qdisc, tc filter, queue overflow 문제일 수 있습니다."
    checks:
      - "tc -s qdisc show dev <iface>"
      - "tc -s filter show dev <iface> ingress"
