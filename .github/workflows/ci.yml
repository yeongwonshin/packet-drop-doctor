name: ci

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Test pure Go packages
        run: go test ./internal/doctor

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check scripts are executable
        run: test -x scripts/gen-vmlinux.sh && test -x scripts/dev-netns-demo.sh
